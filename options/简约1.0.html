<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>快速回复选项</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body { width: 100%; background: transparent; }

      :root {
        --opt-border: color-mix(in srgb, var(--SmartThemeBorderColor, rgba(255, 255, 255, 0.18)) 72%, transparent);
        --opt-shell-bg: color-mix(in srgb, var(--SmartThemeBlurTintColor, rgba(24, 24, 24, 0.94)) 90%, rgba(0, 0, 0, 0.34));
        --opt-shell-soft: color-mix(in srgb, var(--SmartThemeBlurTintColor, rgba(20, 20, 20, 0.88)) 76%, rgba(255, 255, 255, 0.03));
        --opt-item-bg: color-mix(in srgb, var(--SmartThemeBlurTintColor, rgba(18, 18, 18, 0.94)) 72%, rgba(255, 255, 255, 0.02));
        --opt-item-hover: color-mix(in srgb, var(--SmartThemeQuoteColor, rgba(120, 148, 255, 0.2)) 18%, rgba(255, 255, 255, 0.04));
        --opt-text: color-mix(in srgb, var(--SmartThemeBodyColor, #f5f5f5) 88%, #d8dbe6 12%);
        --opt-text-soft: color-mix(in srgb, var(--SmartThemeBodyColor, #f5f5f5) 62%, transparent);
        --opt-text-faint: color-mix(in srgb, var(--SmartThemeBodyColor, #f5f5f5) 48%, transparent);
        --opt-option-text: #d2cbc1;
        --opt-accent: color-mix(in srgb, var(--SmartThemeQuoteColor, #89a5ff) 80%, #ffffff 8%);
        --opt-accent-soft: color-mix(in srgb, var(--SmartThemeQuoteColor, #89a5ff) 16%, transparent);
        --opt-shadow: 0 18px 46px rgba(0, 0, 0, 0.3);
        --opt-radius-xl: 18px;
        --opt-radius-lg: 14px;
        --opt-radius-md: 12px;
        --opt-radius-sm: 10px;
      }

      [data-theme="light"] {
        --opt-border: rgba(113, 123, 148, 0.18);
        --opt-shell-bg: rgba(248, 250, 255, 0.97);
        --opt-shell-soft: rgba(241, 245, 255, 0.9);
        --opt-item-bg: rgba(255, 255, 255, 0.84);
        --opt-item-hover: rgba(104, 128, 255, 0.09);
        --opt-text: #182033;
        --opt-text-soft: rgba(24, 32, 51, 0.64);
        --opt-text-faint: rgba(24, 32, 51, 0.48);
        --opt-option-text: #24304a;
        --opt-accent: #5f78f0;
        --opt-accent-soft: rgba(95, 120, 240, 0.12);
        --opt-shadow: 0 18px 44px rgba(63, 78, 115, 0.16);
      }

      body {
        color: var(--opt-text);
        font-family: 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        padding: 8px 10px 10px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition: color 180ms ease;
      }

      .options-shell {
        position: relative;
        overflow: hidden;
        border: 1px solid transparent;
        border-radius: var(--opt-radius-xl);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 34%) padding-box,
          linear-gradient(var(--opt-shell-bg), var(--opt-shell-bg)) padding-box,
          linear-gradient(90deg, var(--opt-border), color-mix(in srgb, var(--opt-accent) 22%, transparent), var(--opt-border)) border-box;
        box-shadow:
          var(--opt-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px) saturate(1.16);
        -webkit-backdrop-filter: blur(18px) saturate(1.16);
        transition:
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease;
      }

      .options-shell::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--opt-accent) 18%, transparent), transparent 32%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 28%);
        opacity: 0.9;
      }

      .options-header {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid color-mix(in srgb, var(--opt-border) 90%, transparent);
        cursor: pointer;
        user-select: none;
      }

      .options-header::before {
        content: '';
        width: 10px;
        height: 10px;
        flex: 0 0 auto;
        border-radius: 999px;
        background:
          radial-gradient(circle at 35% 35%, #ffffff 0%, color-mix(in srgb, var(--opt-accent) 76%, #ffffff 8%) 45%, color-mix(in srgb, var(--opt-accent) 32%, transparent) 100%);
        box-shadow: 0 0 0 6px color-mix(in srgb, var(--opt-accent-soft) 84%, transparent);
      }

      .header-title {
        flex: 1;
        min-width: 0;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: 0.01em;
        color: color-mix(in srgb, var(--opt-text) 92%, transparent);
      }

      .header-controls {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .ctrl-btn {
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid color-mix(in srgb, var(--opt-border) 92%, rgba(255, 255, 255, 0.08));
        border-radius: var(--opt-radius-sm);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent),
          color-mix(in srgb, var(--opt-item-bg) 94%, transparent);
        color: color-mix(in srgb, var(--opt-text-soft) 94%, var(--opt-text-faint));
        font-size: 12px;
        font-weight: 560;
        cursor: pointer;
        white-space: nowrap;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 8px 18px rgba(0, 0, 0, 0.1);
        transition:
          transform 150ms ease,
          background 150ms ease,
          color 150ms ease,
          border-color 150ms ease,
          box-shadow 150ms ease;
      }

      .ctrl-btn:hover,
      .ctrl-btn:focus-visible {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent),
          color-mix(in srgb, var(--opt-item-hover) 88%, var(--opt-item-bg));
        border-color: color-mix(in srgb, var(--opt-accent) 36%, var(--opt-border));
        color: var(--opt-text);
        transform: translateY(-1px);
        outline: none;
      }

      .ctrl-btn:active {
        transform: scale(0.97);
      }

      .ctrl-btn.icon-btn {
        width: 36px;
        min-width: 36px;
        padding: 0;
        font-size: 15px;
        text-align: center;
      }

      .collapse-icon {
        display: inline-block;
        transition: transform 180ms ease;
        font-style: normal;
      }

      .options-shell.collapsed .collapse-icon { transform: rotate(-180deg); }

      .options-body {
        position: relative;
        z-index: 1;
        padding: 10px 12px 12px;
        overflow: hidden;
        max-height: 9999px;
        opacity: 1;
        transition:
          max-height 320ms ease,
          padding 220ms ease,
          opacity 180ms ease;
      }

      .options-shell.collapsed .options-body {
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        opacity: 0;
      }

      .options-grid {
        display: grid;
        gap: 8px;
      }

      .option-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 14px;
        border: 1px solid color-mix(in srgb, var(--opt-border) 88%, rgba(255, 255, 255, 0.08));
        border-radius: var(--opt-radius-md);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent),
          color-mix(in srgb, var(--opt-item-bg) 98%, transparent);
        cursor: pointer;
        text-align: left;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.035),
          0 10px 22px rgba(0, 0, 0, 0.08);
        transition:
          transform 150ms ease,
          background 150ms ease,
          border-color 150ms ease,
          box-shadow 150ms ease;
      }

      .option-item:hover,
      .option-item:focus-visible {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent),
          color-mix(in srgb, var(--opt-item-hover) 92%, var(--opt-item-bg));
        border-color: color-mix(in srgb, var(--opt-accent) 40%, var(--opt-border));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 14px 28px rgba(0, 0, 0, 0.12);
        transform: translateY(-1px);
        outline: none;
      }

      .option-item:active { transform: scale(0.988); }

      .option-item.sending {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.065), transparent),
          color-mix(in srgb, var(--opt-accent-soft) 78%, var(--opt-item-bg));
        border-color: color-mix(in srgb, var(--opt-accent) 46%, var(--opt-border));
      }

      .option-num {
        display: inline-grid;
        place-items: center;
        width: 26px;
        min-width: 26px;
        height: 26px;
        border: 1px solid color-mix(in srgb, var(--opt-accent) 22%, var(--opt-border));
        border-radius: 999px;
        background: color-mix(in srgb, var(--opt-accent-soft) 82%, transparent);
        color: color-mix(in srgb, var(--opt-accent) 88%, var(--opt-text));
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .option-text {
        flex: 1;
        min-width: 0;
        font-size: 13.5px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--opt-option-text);
        font-weight: 460;
        letter-spacing: 0.01em;
      }

      .options-empty {
        padding: 12px;
        border: 1px dashed color-mix(in srgb, var(--opt-border) 84%, transparent);
        border-radius: var(--opt-radius-md);
        background: color-mix(in srgb, var(--opt-item-bg) 76%, transparent);
        font-size: 12px;
        line-height: 1.5;
        color: color-mix(in srgb, var(--opt-text-soft) 88%, var(--opt-text-faint));
        text-align: center;
      }

      @media (max-width: 600px) {
        body { padding: 6px 6px 8px; }

        .options-header {
          align-items: flex-start;
          flex-direction: column;
          padding: 11px 12px;
        }

        .header-controls {
          width: 100%;
          justify-content: flex-start;
        }

        .ctrl-btn:not(.icon-btn) {
          flex: 1 1 0;
          justify-content: center;
        }

        .options-body { padding: 9px 10px 10px; }

        .option-item {
          padding: 12px;
          gap: 10px;
        }

      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="options-shell" id="options-shell">
      <div class="options-header" id="options-header">
        <span class="header-title">快速回复选项</span>
        <div class="header-controls" id="header-controls">
          <button class="ctrl-btn" id="mode-btn" type="button">直接发送</button>
          <button class="ctrl-btn icon-btn" id="theme-btn" type="button" aria-label="切换主题">☾</button>
          <button class="ctrl-btn icon-btn" id="collapse-btn" type="button" aria-label="折叠">
            <i class="collapse-icon">⌃</i>
          </button>
        </div>
      </div>
      <div class="options-body" id="options-body">
        <div class="options-grid" id="options-grid"></div>
        <div class="options-empty" id="options-empty" hidden>当前楼层没有可用选项。</div>
      </div>
    </div>

    <div id="options-source" hidden>$1</div>

    <script>
      var mode = 'send';
      var collapsed = false;
      var theme = 'dark';

      var MODES = ['send', 'setinput', 'append'];
      var MODE_META = {
        send:     { label: '直接发送', hint: '点击选项后直接发送并触发回复。' },
        setinput: { label: '仅输入',   hint: '点击选项后填入输入框，不立即发送。' },
        append:   { label: '追加输入', hint: '点击选项后追加到输入框末尾，不发送。' },
      };

      function applyTheme(t) {
        theme = t;
        document.documentElement.setAttribute('data-theme', t);
        document.getElementById('theme-btn').textContent = t === 'dark' ? '☾' : '☀';
      }

      function toggleTheme() {
        var next = theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('optionTheme', next);
        applyTheme(next);
      }

      function parseOptions(s) {
        return String(s || '').split('|').map(function(o) { return o.trim(); }).filter(Boolean);
      }

      function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      function updateModeUi() {
        document.getElementById('mode-btn').textContent = MODE_META[mode].label;
      }

      function toggleMode() {
        mode = MODES[(MODES.indexOf(mode) + 1) % MODES.length];
        localStorage.setItem('optionMode', mode);
        updateModeUi();
      }

      function setCollapsed(v) {
        collapsed = !!v;
        document.getElementById('options-shell').classList.toggle('collapsed', collapsed);
      }

      function toggleCollapsed() { setCollapsed(!collapsed); }

      function triggerOption(text) {
        if (!text || !text.trim() || ['…','...'].indexOf(text.trim()) !== -1) return;
        if (typeof triggerSlash !== 'function') {
          console.log('[options] mode:', mode, 'text:', text);
          return;
        }
        if (mode === 'send') {
          triggerSlash('/send ' + text + '|/trigger');
        } else if (mode === 'setinput') {
          triggerSlash('/setinput ' + text);
        } else {
          var $ = window.parent && window.parent.$ ? window.parent.$ : null;
          var cur = $ ? ($('#send_textarea').val() || '') : '';
          triggerSlash('/setinput ' + (cur ? cur + '\n' + text : text));
        }
      }

      function renderOptions(src) {
        var grid = document.getElementById('options-grid');
        var empty = document.getElementById('options-empty');
        var opts = parseOptions(src);

        grid.innerHTML = '';

        if (!opts.length) { empty.hidden = false; return; }
        empty.hidden = true;

        var html = '';
        for (var i = 0; i < opts.length; i++) {
          html += '<div class="option-item" data-text="' + esc(opts[i]) + '" tabindex="0">' +
            '<span class="option-num">' + (i + 1) + '</span>' +
            '<span class="option-text">' + esc(opts[i]) + '</span>' +
            '</div>';
        }
        grid.innerHTML = html;
      }

      document.getElementById('options-grid').addEventListener('click', function(e) {
        var item = e.target.closest('.option-item');
        if (!item) return;
        var text = item.getAttribute('data-text') || '';
        triggerOption(text);
        if (mode !== 'append') {
          item.classList.add('sending');
          setTimeout(function() { item.classList.remove('sending'); }, 300);
          setTimeout(function() { setCollapsed(true); }, 250);
        }
      });

      document.getElementById('options-grid').addEventListener('keydown', function(e) {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        var item = e.target.closest('.option-item');
        if (!item) return;
        e.preventDefault();
        item.click();
      });

      document.getElementById('theme-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        toggleTheme();
      });

      document.getElementById('mode-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        toggleMode();
      });

      document.getElementById('collapse-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        toggleCollapsed();
      });

      document.getElementById('options-header').addEventListener('click', function(e) {
        if (e.target.closest('#header-controls')) return;
        toggleCollapsed();
      });

      setTimeout(function() {
        var savedTheme = localStorage.getItem('optionTheme') || 'dark';
        applyTheme(savedTheme);

        var saved = localStorage.getItem('optionMode');
        if (MODE_META[saved]) mode = saved;
        updateModeUi();

        var src = document.getElementById('options-source');
        var inline = src ? (src.textContent || '').trim() : '';
        if (!inline || inline === '$1') {
          try {
            var msgs = getChatMessages(getCurrentMessageId());
            var raw = msgs && msgs[0] ? msgs[0].message : '';
            var m = raw.match(/<options>([\s\S]*?)<\/options>/i);
            inline = m ? m[1] : '';
          } catch(e) { inline = ''; }
        }
        renderOptions(inline);
        setCollapsed(false);
      }, 0);
    </script>
  </body>
</html>
