<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>妻悦论坛</title>
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/292/main/result.css" />
  </head>

  <body>
    <style>
      :root {
        --dark-red: #c92a2a;
        --blood-red: #e03131;
        --light-red: #ff6b6b;
        --dark-gray: #1a1a1a;
        --gray: #2a2a2a;
        --light-gray: #3a3a3a;
        --text-main: #e0e0e0;
        --text-dim: #999;
        --text-dimmer: #666;
        --gold: #ffd700;
        --border: rgba(220, 20, 60, 0.2);
        --hover-bg: rgba(220, 20, 60, 0.08);
      }

      [data-theme='light'] {
        --dark-red: #c92a2a;
        --blood-red: #e03131;
        --light-red: #ff6b6b;
        --dark-gray: #f5f5f5;
        --gray: #ececec;
        --light-gray: #e0e0e0;
        --text-main: #2a2a2a;
        --text-dim: #666;
        --text-dimmer: #999;
        --gold: #d97706;
        --border: rgba(220, 20, 60, 0.15);
        --hover-bg: rgba(220, 20, 60, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Noto Sans SC',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        color: var(--text-main);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .forum-container {
        width: 100%;
        max-width: 820px;
        margin: 0 auto;
        background: var(--dark-gray);
        font-size: var(--base-font-size, 14px);
        border-radius: 0;
        overflow: hidden;
        position: relative;
      }

      .forum-container.font-medium {
        --base-font-size: 16px;
      }

      .forum-container.font-large {
        --base-font-size: 18px;
      }

      .forum-container.font-xlarge {
        --base-font-size: 20px;
      }

      .forum-header {
        background: var(--blood-red);
        padding: 10px 16px;
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid var(--border);
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .forum-title {
        font-size: 1.1em;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.5px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .header-stats {
        display: flex;
        gap: 12px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.85em;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .theme-toggle,
      .font-size-toggle {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: #fff;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
        font-size: 0.85em;
        font-weight: 500;
        outline: none;
      }

      .theme-toggle:hover,
      .font-size-toggle:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .theme-toggle:active,
      .font-size-toggle:active {
        transform: scale(0.98);
      }

      .sections-nav {
        background: var(--gray);
        border-bottom: 1px solid var(--border);
      }

      .nav-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0;
        padding: 0 8px;
      }

      .nav-row:first-child {
        border-bottom: 1px solid var(--border);
      }

      .nav-button {
        background: transparent;
        color: var(--text-dim);
        border: none;
        padding: 12px 16px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.92em;
        font-weight: 500;
        outline: none;
        border-bottom: 2px solid transparent;
        white-space: nowrap;
        flex: 1;
        min-width: fit-content;
      }

      .nav-button:hover {
        color: var(--blood-red);
        background: var(--hover-bg);
      }

      .nav-button.active {
        color: var(--blood-red);
        border-bottom-color: var(--blood-red);
      }

      .user-info {
        background: var(--gray);
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
      }

      .user-stats {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .user-name {
        font-size: 0.95em;
        color: var(--gold);
        font-weight: 600;
      }

      .user-level-badge {
        display: inline-block;
        padding: 2px 8px;
        background: var(--blood-red);
        color: #fff;
        border-radius: 3px;
        font-size: 0.75em;
        margin-left: 6px;
        font-weight: 600;
      }

      .user-details {
        display: flex;
        gap: 12px;
        color: var(--text-dim);
        font-size: 0.85em;
      }

      .user-details span {
        padding: 2px 8px;
        background: var(--light-gray);
        border-radius: 3px;
      }

      .main-content {
        padding: 0;
      }

      .section-page {
        display: none;
        background: var(--dark-gray);
      }

      .section-page.active {
        display: block;
      }

      .section-header {
        background: var(--gray);
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.95em;
        font-weight: 600;
        color: var(--blood-red);
      }

      .post-list {
        background: var(--dark-gray);
      }

      .post-item {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .post-item:hover {
        background: var(--hover-bg);
      }

      .post-item:active {
        background: rgba(220, 20, 60, 0.12);
      }

      .post-icon {
        font-size: 1.1em;
        flex-shrink: 0;
        opacity: 0.7;
      }

      .post-item-with-image {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .post-thumbnail-wrapper {
        position: relative;
        flex-shrink: 0;
        width: 80px;
        height: 80px;
        border-radius: 4px;
        overflow: hidden;
        cursor: pointer;
      }

      .post-thumbnail {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.2s;
      }

      .post-thumbnail-wrapper:hover .post-thumbnail {
        transform: scale(1.05);
      }

      .post-thumbnail.nsfw-blur {
        filter: blur(15px);
      }

      .post-thumbnail-wrapper:hover .nsfw-blur {
        filter: blur(8px);
      }

      .nsfw-badge {
        position: absolute;
        top: 4px;
        right: 4px;
        background: var(--blood-red);
        color: #fff;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.7em;
        font-weight: 600;
        pointer-events: none;
      }

      .post-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .post-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .post-title {
        font-size: 0.95em;
        color: var(--text-main);
        font-weight: 500;
        line-height: 1.4;
      }

      .hot-badge {
        background: var(--blood-red);
        color: #fff;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 0.75em;
        font-weight: 600;
        flex-shrink: 0;
      }

      .post-tag {
        background: var(--light-gray);
        color: var(--text-dim);
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 0.75em;
        flex-shrink: 0;
      }

      .post-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-dim);
        font-size: 0.82em;
        flex-wrap: wrap;
      }

      .post-author {
        color: var(--text-dim);
        font-weight: 500;
        white-space: nowrap;
      }

      .post-stats {
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .post-stats span {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.95);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      .lightbox.active {
        display: flex;
      }

      .lightbox-image {
        max-width: 90vw;
        max-height: 90vh;
        object-fit: contain;
        border-radius: 8px;
        opacity: 0;
        transform: scale(0.9);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
      }

      .lightbox-image.loaded {
        opacity: 1;
        transform: scale(1);
      }

      .lightbox-loader {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .lightbox-loader.hidden {
        display: none;
      }

      .lightbox-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top-color: var(--blood-red);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .lightbox-loader-text {
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.9em;
      }

      .sidebar-stats {
        background: var(--gray);
        margin: 16px;
        border-radius: 6px;
        border: 1px solid var(--border);
        overflow: hidden;
      }

      .stats-header {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 0.9em;
        font-weight: 600;
        color: var(--blood-red);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
      }

      .stat-box {
        padding: 12px;
        text-align: center;
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      .stat-box:nth-child(2n) {
        border-right: none;
      }

      .stat-box:nth-last-child(-n + 2) {
        border-bottom: none;
      }

      .stat-number {
        font-size: 1.15em;
        color: var(--gold);
        font-weight: 700;
      }

      .stat-label {
        font-size: 0.78em;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .single-male-card {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 12px;
      }

      .single-male-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
      }

      .single-male-info {
        flex: 1;
      }

      .single-male-name {
        font-size: 1em;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 4px;
      }

      .single-male-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }

      .single-male-tag {
        background: var(--light-gray);
        color: var(--text-dim);
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 0.75em;
      }

      .single-male-rating {
        color: var(--gold);
        font-size: 0.85em;
      }

      @media (max-width: 768px) {
        .forum-container {
          font-size: var(--base-font-size, 13px);
        }

        .forum-container.font-medium {
          --base-font-size: 15px;
        }

        .forum-container.font-large {
          --base-font-size: 17px;
        }

        .forum-container.font-xlarge {
          --base-font-size: 19px;
        }

        .header-content {
          gap: 8px;
        }

        .forum-title {
          font-size: 1.15em;
        }

        .nav-row {
          padding: 0 4px;
        }

        .nav-button {
          padding: 10px 8px;
          font-size: 0.88em;
        }

        .post-item {
          padding: 10px 12px;
        }

        .post-thumbnail-wrapper {
          width: 60px;
          height: 60px;
        }

        .sidebar-stats {
          margin: 12px;
        }
      }

      @media (max-width: 480px) {
        .header-stats {
          display: none;
        }

        .stat-box {
          padding: 10px 8px;
        }
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(220, 20, 60, 0.3);
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(220, 20, 60, 0.5);
      }

      * {
        -webkit-tap-highlight-color: transparent;
      }

      .loading {
        text-align: center;
        padding: 50px;
        color: var(--text-dim);
        font-size: 1.1em;
      }

      .page-loader {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--dark-gray);
        z-index: 9999;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
      }

      .page-loader.loading {
        display: flex;
        animation: fadeIn 0.15s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid var(--light-gray);
        border-top-color: var(--blood-red);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loader-text {
        color: var(--text-dim);
        font-size: 0.9em;
      }
    </style>

    <div class="forum-container" id="forum-container">
      <div class="loading">界面加载失败,请重roll聊天试试...</div>
      <div class="page-loader" id="page-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">加载中...</div>
      </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
      <div class="lightbox-loader" id="lightbox-loader">
        <div class="lightbox-spinner"></div>
        <div class="lightbox-loader-text">加载图片中...</div>
      </div>
      <img class="lightbox-image" id="lightbox-image" src="" alt="" />
    </div>

    <script>
      const chat_message = getChatMessages(getCurrentMessageId())[0];
      const match = chat_message.message.match(/<forum_data>([\s\S]*?)<\/forum_data>/);
      const forumDataXML = match ? match[0] : '<forum_data></forum_data>';
      const IMAGE_BASE_URL = 'https://img.emolsp.online/CG/wife_forum/';

      function parseForumDataXML(xmlText) {
        console.log('========== 论坛数据解析开始 ==========');
        console.log('XML数据长度:', xmlText.length);

        const data = {
          title: '',
          onlineCount: '',
          todayPosts: '',
          totalPosts: '',
          totalUsers: '',
          userName: '',
          userLevel: '',
          hotPosts: [],
          recentPosts: [],
          witnessPosts: [],
          datingPosts: [],
          recordPosts: [],
          singleMales: [],
          literaturePosts: [],
        };

        try {
          const titleMatch = xmlText.match(/\[论坛标题\|([^\]]+)\]/);
          if (titleMatch) data.title = titleMatch[1];

          const onlineMatch = xmlText.match(/\[在线人数\|([^\]]+)\]/);
          if (onlineMatch) data.onlineCount = onlineMatch[1];

          const todayPostsMatch = xmlText.match(/\[今日新帖\|([^\]]+)\]/);
          if (todayPostsMatch) data.todayPosts = todayPostsMatch[1];

          const totalPostsMatch = xmlText.match(/\[总帖数\|([^\]]+)\]/);
          if (totalPostsMatch) data.totalPosts = totalPostsMatch[1];

          const totalUsersMatch = xmlText.match(/\[注册用户\|([^\]]+)\]/);
          if (totalUsersMatch) data.totalUsers = totalUsersMatch[1];

          const userNameMatch = xmlText.match(/\[用户名\|([^\]]+)\]/);
          if (userNameMatch) data.userName = userNameMatch[1];

          const userLevelMatch = xmlText.match(/\[用户等级\|([^\]]+)\]/);
          if (userLevelMatch) data.userLevel = userLevelMatch[1];

          const hotPostsMatch = xmlText.match(/<hot_posts>([\s\S]*?)<\/hot_posts>/i);
          if (hotPostsMatch && hotPostsMatch[1]) {
            const postRegex = /\[热门帖子\|([^\|]+)\|([^\|]+)\|([^\]]+)\]/g;
            let postMatch;
            while ((postMatch = postRegex.exec(hotPostsMatch[1])) !== null) {
              data.hotPosts.push({
                title: postMatch[1],
                author: postMatch[2],
                replies: postMatch[3],
              });
            }
          }

          const recentPostsMatch = xmlText.match(/<recent_posts>([\s\S]*?)<\/recent_posts>/i);
          if (recentPostsMatch && recentPostsMatch[1]) {
            const postRegex = /\[最新帖子\|([^\|]+)\|([^\|]+)\|([^\]]+)\]/g;
            let postMatch;
            while ((postMatch = postRegex.exec(recentPostsMatch[1])) !== null) {
              data.recentPosts.push({
                title: postMatch[1],
                author: postMatch[2],
                time: postMatch[3],
              });
            }
          }

          const witnessMatch = xmlText.match(/<witness_posts>([\s\S]*?)<\/witness_posts>/i);
          if (witnessMatch && witnessMatch[1]) {
            const postRegex = /\[见证帖\|([^\|]+)\|([^\|]+)\|([^\|]*)\|([^\|]+)\|([^\]]+)\]/g;
            let postMatch;
            while ((postMatch = postRegex.exec(witnessMatch[1])) !== null) {
              const imageUrl = postMatch[3] ? IMAGE_BASE_URL + postMatch[3] : '';
              data.witnessPosts.push({
                title: postMatch[1],
                author: postMatch[2],
                image: imageUrl,
                nsfw: postMatch[4] === 'true',
                replies: postMatch[5],
              });
            }
          }

          const datingMatch = xmlText.match(/<dating_posts>([\s\S]*?)<\/dating_posts>/i);
          if (datingMatch && datingMatch[1]) {
            const postRegex = /\[约炮帖\|([^\|]+)\|([^\|]+)\|([^\|]*)\|([^\]]+)\]/g;
            let postMatch;
            while ((postMatch = postRegex.exec(datingMatch[1])) !== null) {
              const imageUrl = postMatch[3] ? IMAGE_BASE_URL + postMatch[3] : '';
              data.datingPosts.push({
                title: postMatch[1],
                author: postMatch[2],
                image: imageUrl,
                time: postMatch[4],
              });
            }
          }

          const recordMatch = xmlText.match(/<record_posts>([\s\S]*?)<\/record_posts>/i);
          if (recordMatch && recordMatch[1]) {
            const postRegex = /\[实录帖\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\]]+)\]/g;
            let postMatch;
            while ((postMatch = postRegex.exec(recordMatch[1])) !== null) {
              data.recordPosts.push({
                title: postMatch[1],
                author: postMatch[2],
                rating: postMatch[3],
                time: postMatch[4],
              });
            }
          }

          const singleMaleMatch = xmlText.match(/<single_males>([\s\S]*?)<\/single_males>/i);
          if (singleMaleMatch && singleMaleMatch[1]) {
            const maleRegex = /\[单男\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\]]+)\]/g;
            let maleMatch;
            while ((maleMatch = maleRegex.exec(singleMaleMatch[1])) !== null) {
              data.singleMales.push({
                name: maleMatch[1],
                level: maleMatch[2],
                location: maleMatch[3],
                rating: maleMatch[4],
              });
            }
          }

          const literatureMatch = xmlText.match(/<literature_posts>([\s\S]*?)<\/literature_posts>/i);
          if (literatureMatch && literatureMatch[1]) {
            const postRegex = /\[文墨帖\|([^\|]+)\|([^\|]+)\|([^\|]+)\|([^\]]+)\]/g;
            let postMatch;
            while ((postMatch = postRegex.exec(literatureMatch[1])) !== null) {
              data.literaturePosts.push({
                title: postMatch[1],
                author: postMatch[2],
                replies: postMatch[3],
                time: postMatch[4],
              });
            }
          }

          console.log('解析完成 - 热门:', data.hotPosts.length, '最新:', data.recentPosts.length);
          console.log('见证区:', data.witnessPosts.length, '约炮区:', data.datingPosts.length);
          console.log('实录区:', data.recordPosts.length, '单男区:', data.singleMales.length);
          console.log('文墨区:', data.literaturePosts.length);
          console.log('========== 论坛数据解析完成 ==========');
          return data;
        } catch (error) {
          console.error('解析论坛数据出错:', error);
          return data;
        }
      }

      function renderForum(data) {
        console.log('开始渲染论坛...');

        const container = document.getElementById('forum-container');

        if (!data.title) {
          container.innerHTML = '<div class="loading">界面加载失败,应该是掉格式了,请重roll聊天试试...</div>';
          return;
        }

        let hotPostsHTML = '';
        data.hotPosts.forEach((post, index) => {
          hotPostsHTML += `
            <div class="post-item" onclick="viewPost('${post.title}')">
              <div class="post-icon">🔥</div>
              <div class="post-content">
                <div class="post-title-row">
                  ${index < 2 ? '<span class="hot-badge">热</span>' : ''}
                  <div class="post-title">${post.title}</div>
                </div>
                <div class="post-meta">
                  <span class="post-author">👤 ${post.author}</span>
                  <div class="post-stats">
                    <span>💬 ${post.replies}</span>
                  </div>
                </div>
              </div>
            </div>
          `;
        });

        let recentPostsHTML = '';
        data.recentPosts.forEach(post => {
          recentPostsHTML += `

      function cycleFontSize() {
        const container = document.getElementById('forum-container');
        const icon = document.getElementById('font-size-icon');
        const fontSizes = ['small', 'medium', 'large', 'xlarge'];
        const fontIcons = ['A', 'A+', 'A++', 'A+++'];

        let currentSize = localStorage.getItem('forum-font-size') || 'small';
        let currentIndex = fontSizes.indexOf(currentSize);
        let nextIndex = (currentIndex + 1) % fontSizes.length;
        let nextSize = fontSizes[nextIndex];

        container.classList.remove('font-medium', 'font-large', 'font-xlarge');

        if (nextSize !== 'small') {
          container.classList.add('font-' + nextSize);
        }

        icon.textContent = fontIcons[nextIndex];
        localStorage.setItem('forum-font-size', nextSize);

        console.log('字体大小切换到:', nextSize);
      }

      function syncThemeFromStorage(e) {
        if (e.key === 'forum-theme') {
          const body = document.body;
          const icon = document.getElementById('theme-icon');

          if (e.newValue === 'light') {
            body.setAttribute('data-theme', 'light');
            if (icon) icon.textContent = '☀️';
          } else {
            body.removeAttribute('data-theme');
            if (icon) icon.textContent = '🌙';

        if (e.key === 'forum-font-size') {
          const container = document.getElementById('forum-container');
          const icon = document.getElementById('font-size-icon');
          const fontSizes = ['small', 'medium', 'large', 'xlarge'];
          const fontIcons = ['A', 'A+', 'A++', 'A+++'];

          container.classList.remove('font-medium', 'font-large', 'font-xlarge');

          if (e.newValue && e.newValue !== 'small') {
            container.classList.add('font-' + e.newValue);

          let index = fontSizes.indexOf(e.newValue || 'small');
          if (icon) icon.textContent = fontIcons[index];
        }
      }

          const fontSize = localStorage.getItem('forum-font-size') || 'small';
          const container = document.getElementById('forum-container');
          const fontIcon = document.getElementById('font-size-icon');
          const fontSizes = ['small', 'medium', 'large', 'xlarge'];
          const fontIcons = ['A', 'A+', 'A++', 'A+++'];

          if (fontSize !== 'small') {
            container.classList.add('font-' + fontSize);
          }

          let index = fontSizes.indexOf(fontSize);
          if (fontIcon) {
            fontIcon.textContent = fontIcons[index];
          }
        } catch (error) {
          console.error('渲染失败:', error);
          document.getElementById('forum-container').innerHTML = '<div class="loading">数据加载失败,请刷新重试</div>';
        }
      }, 0);
    </script>
  </body>
</html>
