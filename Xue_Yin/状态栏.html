<head>
    <style>
        :root {
            /* 材质与色彩：拍立得相纸/手账本 · 昼间 */
            --st-bg: transparent;
            --st-paper: #faf8f5; /* 暖白相纸底色 */
            --st-border: #e6e2db;
            --st-border-strong: rgba(0, 0, 0, 0.08);
            --st-text-main: #3a342c;
            --st-text-muted: #8c8273;
            --st-accent: #d4849a; /* 温和的粉色作为强调 */
            --st-tape: rgba(235, 227, 215, 0.85); /* 胶带底色 */
            --st-success: #5f9d72;
            --st-danger: #c95c55;
            
            --st-shadow-ambient: 0 8px 30px rgba(40, 30, 20, 0.08);
            --st-shadow-photo: inset 0 0 0 1px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.06);
            --st-photo-border: #ffffff;

            /* 字体排版 */
            --st-font-mono: "JetBrains Mono", "SF Mono", "Consolas", monospace;
            --st-font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
            --st-font-serif: "Songti SC", "Noto Serif CJK SC", "STSong", serif;
            --st-font-hand: "Kaiti SC", "STKaiti", "KaiTi", cursive;
            
            /* 动效 */
            --st-ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        body.theme-night {
            /* 材质与色彩：拍立得相纸/手账本 · 夜间 */
            --st-paper: #282a30; /* 偏冷一点的深灰色相纸 */
            --st-border: #3f424a;
            --st-border-strong: rgba(255, 255, 255, 0.06);
            --st-text-main: #e6e8eb;
            --st-text-muted: #9ea3ac;
            --st-accent: #f2aebf;
            --st-tape: rgba(48, 51, 59, 0.85);
            --st-success: #86c99a;
            --st-danger: #ef766d;
            
            --st-shadow-ambient: 0 8px 30px rgba(0, 0, 0, 0.5);
            --st-shadow-photo: inset 0 0 0 1px rgba(255,255,255,0.03), 0 2px 12px rgba(0,0,0,0.25);
            --st-photo-border: #1e1f24;
        }

        body {
            margin: 0;
            padding: 16px;
            background: var(--st-bg);
            font-family: var(--st-font-sans);
            color: var(--st-text-main);
            transition: color 0.4s var(--st-ease);
            display: flex;
            justify-content: center;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }

        /* 外层主容器：拍立得相纸本体 */
        .st-polaroid {
            width: 100%;
            max-width: 420px;
            background: var(--st-paper);
            border-radius: 6px 6px 4px 4px;
            box-shadow: var(--st-shadow-ambient);
            border: 1px solid var(--st-border-strong);
            padding: 14px 14px 24px 14px;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: background 0.4s var(--st-ease), box-shadow 0.4s var(--st-ease), padding 0.5s var(--st-ease), gap 0.5s var(--st-ease);
        }

        .st-polaroid.collapsed {
            padding-bottom: 14px;
            gap: 0;
        }

        /* 顶部控制区：极简风格 */
        .st-header {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
            display: flex;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: opacity 0.3s var(--st-ease), transform 0.3s var(--st-ease);
        }

        .st-polaroid.controls-visible .st-header,
        .st-header:focus-within {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .st-btn {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--st-ease);
        }

        .st-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: scale(1.05);
        }

        .st-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            transition: transform 0.4s var(--st-ease);
        }

        .st-polaroid.collapsed #btn-collapse svg {
            transform: rotate(180deg);
        }

        /* 挂件通用动画 */
        @keyframes swing {
            0%, 100% { transform: rotate(4deg); }
            50% { transform: rotate(-4deg); }
        }
        @keyframes swing-asym {
            0%, 100% { transform: rotate(3deg); }
            50% { transform: rotate(-5deg); }
        }
        @keyframes swing-fast {
            0%, 100% { transform: rotate(5deg); }
            50% { transform: rotate(-3deg); }
        }

        /* 顶部挂件：风铃 */
        .st-pendant-windchime {
            position: absolute;
            top: 8px;
            right: clamp(86px, 26%, 126px);
            width: 32px;
            height: 90px;
            z-index: 8;
            pointer-events: none;
            transform-origin: top center;
            animation: swing 5s ease-in-out infinite;
        }

        /* 左侧挂件：御守 */
        .st-pendant-omamori {
            position: absolute;
            top: 85px;
            left: -4px; /* 向内收一点，显得贴在边框上 */
            width: 28px;
            height: 70px;
            z-index: 20;
            pointer-events: none;
            transform-origin: top center;
            animation: swing-asym 6s ease-in-out infinite 1s;
        }

        /* 右侧挂件：晴天娃娃 */
        .st-pendant-bozu {
            position: absolute;
            top: 160px;
            right: -4px; /* 向内收一点 */
            width: 30px;
            height: 60px;
            z-index: 20;
            pointer-events: none;
            transform-origin: top center;
            animation: swing-fast 4.5s ease-in-out infinite 0.5s;
        }

        /* 照片显示区 */
        .st-photo-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            background: var(--st-photo-border);
            border-radius: 2px;
            box-shadow: var(--st-shadow-photo);
            overflow: hidden;
            transition: background 0.4s var(--st-ease);
        }

        /* 实际CG背景层 */
        .st-photo-cg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            transition: background-image 1.2s ease;
            z-index: 1;
        }

        /* 和纸胶带：情绪标签 */
        .st-tape-emotion {
            position: absolute;
            top: -6px;
            left: 12px;
            background: var(--st-tape);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 4px 16px;
            font-family: var(--st-font-hand);
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--st-accent);
            box-shadow: 1px 1px 3px rgba(0,0,0,0.05);
            z-index: 5;
            transform: rotate(-2deg);
            border-radius: 1px;
            /* 胶带边缘撕裂效果伪装 */
            border-left: 2px dashed rgba(0,0,0,0.05);
            border-right: 2px dashed rgba(0,0,0,0.05);
        }

        /* 底部信息区容器 */
        .st-info-wrapper {
            display: grid;
            grid-template-rows: 1fr;
            transition: grid-template-rows 0.5s var(--st-ease), opacity 0.4s var(--st-ease), margin 0.5s var(--st-ease);
        }

        .st-polaroid.collapsed .st-info-wrapper {
            grid-template-rows: 0fr;
            opacity: 0;
        }

        .st-info-inner {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 女儿的想法：手写批注区 */
        .st-thought-section {
            padding: 8px 18px 10px;
        }

        .st-thought-text {
            font-family: var(--st-font-hand);
            font-size: 1rem;
            line-height: 1.68;
            color: var(--st-text-main);
            position: relative;
            padding: 0 24px;
        }

        /* 批注引号装饰 */
        .st-thought-text::before,
        .st-thought-text::after {
            position: absolute;
            font-family: var(--st-font-serif);
            font-size: 2.15rem;
            font-weight: 700;
            line-height: 1;
            color: color-mix(in srgb, var(--st-accent) 58%, var(--st-border));
            opacity: 0.74;
            text-shadow: 0 1px 0 var(--st-photo-border);
        }

        .st-thought-text::before {
            content: '“';
            left: 0;
            top: -10px;
        }

        .st-thought-text::after {
            content: '”';
            right: 0;
            bottom: -14px;
        }

        /* 冲印信息区：底部便签票据 */
        .st-stamp-info {
            position: relative;
            background: rgba(0, 0, 0, 0.02);
            border: 1px dashed var(--st-border);
            border-radius: 4px;
            padding: 16px 14px;
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            row-gap: 14px;
            column-gap: 24px;
            font-family: var(--st-font-mono);
            font-size: 0.75rem;
            color: var(--st-text-muted);
            text-transform: uppercase;
            overflow: hidden;
        }

        body.theme-night .st-stamp-info {
            background: rgba(255, 255, 255, 0.02);
        }

        /* 票据固定用的小胶带 */
        .st-mini-tape {
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%) rotate(-1.5deg);
            width: 36px;
            height: 12px;
            background: var(--st-tape);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-left: 2px dashed rgba(0,0,0,0.05);
            border-right: 2px dashed rgba(0,0,0,0.05);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 2;
            opacity: 0.9;
        }

        /* 票据上的猫爪印章水印 */
        .st-cat-stamp {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            z-index: 0;
            pointer-events: none;
        }

        .st-stamp-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 1;
        }

        .st-stamp-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--st-border-strong);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.72rem;
            color: var(--st-text-main);
            letter-spacing: 0.05em;
            width: fit-content;
        }
        
        .st-stamp-label svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
            opacity: 0.7;
        }

        .st-stamp-value {
            font-family: var(--st-font-sans);
            font-size: 0.8rem;
            line-height: 1.4;
            word-wrap: break-word;
            padding-left: 2px;
        }

        /* 记忆稳定性：打孔刻度/印章线 */
        .st-memory-scale {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }

        .st-memory-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--st-font-hand);
            font-size: 0.85rem;
            color: var(--st-text-muted);
            white-space: nowrap;
        }

        .st-delta-badge {
            min-width: 26px;
            padding: 2px 7px;
            border: 1px solid var(--st-border);
            border-radius: 999px;
            background: color-mix(in srgb, var(--st-photo-border) 54%, transparent);
            color: var(--st-text-muted);
            font-family: var(--st-font-mono);
            font-size: 0.62rem;
            line-height: 1.2;
            text-align: center;
            text-transform: none;
            transition: background 0.35s var(--st-ease), border-color 0.35s var(--st-ease), color 0.35s var(--st-ease);
        }

        .st-delta-badge.up {
            border-color: color-mix(in srgb, var(--st-success) 62%, var(--st-border));
            background: color-mix(in srgb, var(--st-success) 16%, transparent);
            color: var(--st-success);
        }

        .st-delta-badge.down {
            border-color: color-mix(in srgb, var(--st-danger) 60%, var(--st-border));
            background: color-mix(in srgb, var(--st-danger) 12%, transparent);
            color: var(--st-danger);
        }

        .st-delta-badge.reset {
            border-color: var(--st-border);
            background: var(--st-border-strong);
            color: var(--st-text-muted);
        }

        .st-delta-badge.unknown {
            border-color: color-mix(in srgb, #d6ad5b 65%, var(--st-border));
            background: color-mix(in srgb, #d6ad5b 14%, transparent);
            color: #9a7432;
        }

        .st-memory-track {
            flex-grow: 1;
            display: flex;
            gap: 5px;
            height: 10px;
            align-items: center;
        }

        .st-mark {
            flex: 1;
            height: 5px;
            background: var(--st-border);
            border-radius: 3px;
            transition: background 0.4s var(--st-ease);
        }

        .st-mark.filled {
            background: var(--st-text-muted);
        }
        
        .st-mark.danger.filled {
            background: var(--st-danger);
        }

        @media (max-width: 480px) {
            .st-polaroid {
                border-radius: 0;
                border-left: none;
                border-right: none;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }
            .st-thought-section {
                padding-left: 12px;
                padding-right: 12px;
            }
            .st-thought-text {
                font-size: 0.96rem;
                padding: 0 22px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
            }
        }
    </style>

    <script>
    (() => {
        const THEME_KEY = 'mvu-st-theme';
        const COLLAPSE_KEY = 'mvu-st-collapsed';
        const THEME_EVENT = 'mvu-st-theme-change';
        const COLLAPSE_EVENT = 'mvu-st-collapse-change';

        function getStageName(stability) {
            if (stability < 21) return '融合期';
            if (stability < 41) return '混乱期';
            if (stability < 61) return '平衡期';
            if (stability < 81) return '整合期';
            return '主宰期';
        }

        function getEmotionBackground(emotion) {
            const emotionStr = String(emotion).trim();
            const map = {
                '撒娇': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E6%92%92%E5%A8%87.jpeg',
                '委屈': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E5%A7%94%E5%B1%88.jpeg',
                '倔强': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E5%80%94%E5%BC%BA.jpeg',
                '害羞': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E5%AE%B3%E7%BE%9E.jpeg',
                '兴奋': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E5%85%B4%E5%A5%8B.jpeg',
                '安静': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E5%AE%89%E9%9D%99.jpeg',
                '焦虑': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E7%84%A6%E8%99%91.jpeg',
                '开心': 'https://testingcf.jsdelivr.net/gh/emo-lsp/ST_CG@refs/heads/main/Xue_Yin/%E5%BC%80%E5%BF%83.jpeg',
            };
            const url = map[emotionStr] || map['安静'];
            return `url('${url}')`;
        }

        /* 渲染离散刻度（代替原圆点） */
        function renderScale(containerId, value, maxVal, isDanger) {
            const total = 10; // 刻度数量
            const fillCount = Math.ceil((value / maxVal) * total);
            let html = '';
            for (let i = 0; i < total; i++) {
                const cls = i < fillCount ? (isDanger ? 'filled danger' : 'filled') : '';
                html += `<div class="st-mark ${cls}"></div>`;
            }
            $(`#${containerId}`).html(html);
        }

        function parseNumber(value) {
            if (typeof value === 'number') return Number.isFinite(value) ? value : null;
            const match = String(value ?? '').match(/-?\d+(?:\.\d+)?/);
            return match ? Number(match[0]) : null;
        }

        function getMessageStatData(message) {
            return _.get(message, 'data.stat_data') ??
                _.get(message, 'variables.stat_data') ??
                _.get(message, 'data.variables.stat_data') ??
                null;
        }

        async function getPreviousStatData() {
            const messageId = Number(getCurrentMessageId());
            if (!Number.isFinite(messageId) || messageId <= 0) return null;

            try {
                const prevMessages = await getChatMessages(messageId - 1);
                return getMessageStatData(prevMessages?.[0]);
            } catch (error) {
                console.warn('[st-status] 读取上一楼变量失败:', error);
                return null;
            }
        }

        function renderDeltaBadge(elementId, currentValue, prevValue, hasPrevData) {
            const $badge = $(`#${elementId}`);
            const currentNumber = parseNumber(currentValue);
            const prevNumber = hasPrevData ? parseNumber(prevValue) : currentNumber;

            if (currentNumber === null || prevNumber === null) {
                $badge.text('--').attr('class', 'st-delta-badge unknown').attr('title', '无法比较上一楼数值');
                return;
            }

            const delta = hasPrevData ? currentNumber - prevNumber : 0;
            const roundedDelta = Math.round(delta * 10) / 10;
            let label = '0';
            let state = 'zero';

            if (currentNumber === 0 && prevNumber !== 0) {
                label = '归零';
                state = 'reset';
            } else if (roundedDelta > 0) {
                label = `+${roundedDelta} ↑`;
                state = 'up';
            } else if (roundedDelta < 0) {
                label = `${roundedDelta} ↓`;
                state = 'down';
            }

            $badge
                .text(label)
                .attr('class', `st-delta-badge ${state}`)
                .attr('title', hasPrevData ? `较上一楼变化 ${roundedDelta}` : '无上一楼可比较');
        }

        async function populateData() {
            const all_variables = getAllVariables();
            const prevStatData = await getPreviousStatData();

            const time = _.get(all_variables, 'stat_data.世界.当前时间', '未知');
            const location = _.get(all_variables, 'stat_data.世界.当前地点', '未知');
            const stabilityRaw = _.get(all_variables, 'stat_data.记忆稳定性', 0);
            const stability = parseNumber(stabilityRaw) ?? 0;
            const prevStability = prevStatData === null ? stability : _.get(prevStatData, '记忆稳定性');
            const outfit = _.get(all_variables, 'stat_data.雪音.当前着装', '未知');
            const thought = _.get(all_variables, 'stat_data.雪音.当前想法', '...');
            const emotion = _.get(all_variables, 'stat_data.雪音.当前情绪', '安静');

            $('#val-time').text(time).attr('title', time);
            $('#val-location').text(location).attr('title', location);
            $('#val-outfit').text(outfit).attr('title', outfit);
            
            $('#val-emotion').text(emotion);
            $('#val-thought').text(thought);

            $('#val-stage-text').text(`记忆${getStageName(stability)} · ${stability}%`);
            renderDeltaBadge('val-stability-delta', stability, prevStability, prevStatData !== null);
            renderScale('track-stability', stability, 100, stability < 30);

            $('#cg-layer').css('background-image', getEmotionBackground(emotion));
        }

        async function init() {
            /* 必须等待 MVU 初始化 */
            await waitGlobalInitialized('Mvu');
            const $polaroid = $('#st-polaroid');
            let controlsTimer = null;
            const hideControlsLater = () => {
                clearTimeout(controlsTimer);
                controlsTimer = setTimeout(() => {
                    $polaroid.removeClass('controls-visible');
                }, 2600);
            };
            const showControls = () => {
                $polaroid.addClass('controls-visible');
                hideControlsLater();
            };

            /* 1. 处理主题切换 */
            const applyTheme = (isNight) => {
                $('body').toggleClass('theme-night', isNight);
            };
            const broadcastTheme = (theme) => {
                const detail = { theme };
                window.dispatchEvent(new CustomEvent(THEME_EVENT, { detail }));
                if (window.parent && window.parent !== window) {
                    window.parent.dispatchEvent(new CustomEvent(THEME_EVENT, { detail }));
                }
            };
            const normalizeTheme = (theme) => theme === 'night' || theme === 'dark' ? 'night' : 'day';
            let isNight = normalizeTheme(localStorage.getItem(THEME_KEY)) === 'night';
            const setTheme = (theme, shouldBroadcast = false) => {
                const nextTheme = normalizeTheme(theme);
                isNight = nextTheme === 'night';
                localStorage.setItem(THEME_KEY, nextTheme);
                applyTheme(isNight);
                if (shouldBroadcast) broadcastTheme(nextTheme);
            };
            setTheme(isNight ? 'night' : 'day');

            $('#btn-theme').on('click', () => {
                setTheme(isNight ? 'day' : 'night', true);
                showControls();
            });

            /* 2. 处理折叠切换 */
            const applyCollapse = (collapsed) => {
                $polaroid.toggleClass('collapsed', collapsed);
            };
            const setCollapse = (collapsed) => {
                isCollapsed = !!collapsed;
                localStorage.setItem(COLLAPSE_KEY, String(isCollapsed));
                applyCollapse(isCollapsed);
            };
            let isCollapsed = localStorage.getItem(COLLAPSE_KEY) === 'true';
            applyCollapse(isCollapsed);

            $('#btn-collapse').on('click', () => {
                setCollapse(!isCollapsed);
                showControls();
            });

            $polaroid.on('click touchstart pointerdown', (event) => {
                if ($(event.target).closest('.st-btn').length) return;
                showControls();
            });

            const onThemeEvent = (event) => setTheme(event.detail?.theme || 'day');
            window.addEventListener(THEME_EVENT, onThemeEvent);
            if (window.parent && window.parent !== window) {
                window.parent.addEventListener(THEME_EVENT, onThemeEvent);
            }
            window.addEventListener('storage', (event) => {
                if (event.key === THEME_KEY) setTheme(event.newValue || 'day');
                if (event.key === COLLAPSE_KEY) setCollapse(event.newValue === 'true');
            });
            window.addEventListener(COLLAPSE_EVENT, (event) => setCollapse(!!event.detail?.collapsed));
            if (window.parent && window.parent !== window) {
                window.parent.addEventListener(COLLAPSE_EVENT, (event) => setCollapse(!!event.detail?.collapsed));
            }

            /* 3. 注入数据 */
            await populateData();
        }

        /* 使用 MVU 指定的错误捕获包装器 */
        $(errorCatched(init));
    })();
    </script>
</head>
<body>
    <div id="st-polaroid" class="st-polaroid">
        
        <!-- 顶部挂件：日式风铃 -->
        <div class="st-pendant-windchime">
            <svg viewBox="0 0 32 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 固定图钉 -->
                <circle cx="16" cy="3" r="2.5" fill="#e0e0e0" stroke="var(--st-text-muted)" stroke-width="0.5" opacity="0.9"/>
                <circle cx="15.5" cy="2.5" r="0.8" fill="#ffffff" />
                <!-- 挂线 -->
                <line x1="16" y1="3" x2="16" y2="25" stroke="var(--st-text-muted)" stroke-width="1.5" opacity="0.5"/>
                <!-- 玻璃主体 -->
                <path d="M16 50C21.5 50 26 45 26 38C26 31 20 25 16 25C12 25 6 31 6 38C6 45 10.5 50 16 50Z" fill="var(--st-bg)" stroke="var(--st-text-muted)" stroke-width="1.5" fill-opacity="0.1"/>
                <path d="M6 38C6 42 10 45 16 45C22 45 26 42 26 38" stroke="var(--st-text-muted)" stroke-width="1" opacity="0.3"/>
                <!-- 内部撞击铃舌 -->
                <circle cx="16" cy="35" r="2" fill="var(--st-accent)"/>
                <!-- 下方短线 -->
                <line x1="16" y1="37" x2="16" y2="55" stroke="var(--st-text-muted)" stroke-width="1" opacity="0.7"/>
                <!-- 祈愿纸签 -->
                <rect x="12" y="55" width="8" height="22" fill="var(--st-accent)" opacity="0.8" rx="1"/>
            </svg>
        </div>

        <!-- 左侧挂件：御守 -->
        <div class="st-pendant-omamori">
            <svg viewBox="0 0 28 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 胶带固定 -->
                <rect x="5" y="0" width="18" height="6" fill="var(--st-tape)" stroke="rgba(0,0,0,0.03)" stroke-width="0.5" transform="rotate(-8 14 3)" opacity="0.95"/>
                <!-- 挂线 -->
                <line x1="14" y1="3" x2="14" y2="15" stroke="var(--st-text-muted)" stroke-width="1.5" opacity="0.5"/>
                <!-- 绳结 -->
                <path d="M10 15 Q 14 10 18 15 Q 14 20 10 15" fill="var(--st-danger)" opacity="0.7"/>
                <path d="M14 15 L 8 22 M14 15 L 20 22" stroke="var(--st-danger)" stroke-width="1.5" opacity="0.7"/>
                <!-- 御守本体 -->
                <path d="M 6 22 L 22 22 L 26 27 L 26 52 L 2 52 L 2 27 Z" fill="var(--st-paper)" stroke="var(--st-text-muted)" stroke-width="1"/>
                <path d="M 6 22 L 22 22 L 26 27 L 26 52 L 2 52 L 2 27 Z" fill="var(--st-accent)" fill-opacity="0.15"/>
                <rect x="5" y="27" width="18" height="22" stroke="var(--st-accent)" stroke-width="1" opacity="0.4" rx="1"/>
                <text x="14" y="43" font-family="var(--st-font-serif)" font-size="11" fill="var(--st-accent)" text-anchor="middle" font-weight="bold" opacity="0.85">祈</text>
            </svg>
        </div>

        <!-- 右侧挂件：晴天娃娃 -->
        <div class="st-pendant-bozu">
            <svg viewBox="0 0 30 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 胶带固定 -->
                <rect x="6" y="0" width="18" height="6" fill="var(--st-tape)" stroke="rgba(0,0,0,0.03)" stroke-width="0.5" transform="rotate(6 15 3)" opacity="0.95"/>
                <!-- 挂线 -->
                <line x1="15" y1="3" x2="15" y2="10" stroke="var(--st-text-muted)" stroke-width="1.5" opacity="0.5"/>
                <!-- 身体布料 -->
                <path d="M 9 24 Q 5 45 6 52 Q 10 48 15 52 Q 20 48 24 52 Q 25 45 21 24 Z" fill="var(--st-paper)" stroke="var(--st-text-muted)" stroke-width="1"/>
                <!-- 头 -->
                <circle cx="15" cy="18" r="8" fill="var(--st-paper)" stroke="var(--st-text-muted)" stroke-width="1"/>
                <!-- 眼睛 -->
                <circle cx="12" cy="17" r="1" fill="var(--st-text-muted)"/>
                <circle cx="18" cy="17" r="1" fill="var(--st-text-muted)"/>
                <!-- 嘴巴 -->
                <path d="M 13 21 Q 15 23 17 21" stroke="var(--st-text-muted)" stroke-width="1" fill="none"/>
                <!-- 红色小蝴蝶结 -->
                <path d="M 15 25 L 11 23 L 11 27 Z M 15 25 L 19 23 L 19 27 Z" fill="var(--st-danger)" opacity="0.6"/>
            </svg>
        </div>

        <!-- 相框区 -->
        <div class="st-photo-frame">
            <div id="cg-layer" class="st-photo-cg"></div>
            
            <div class="st-tape-emotion" id="val-emotion">安静</div>

            <header class="st-header">
                <button id="btn-theme" class="st-btn" aria-label="主题" title="切换昼夜">
                    <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
                </button>
                <button id="btn-collapse" class="st-btn" aria-label="折叠" title="收起/展开相纸">
                    <svg viewBox="0 0 24 24"><path d="M16 8l-4 4-4-4-1.41 1.41L12 15.24l5.41-5.41z"/></svg>
                </button>
            </header>
        </div>

        <!-- 下方相纸留白区（可折叠） -->
        <div class="st-info-wrapper">
            <div class="st-info-inner">
                
                <!-- 手写想法批注 -->
                <div class="st-thought-section">
                    <div class="st-thought-text" id="val-thought">...</div>
                </div>

                <!-- 底部辅助信息：便签票据 -->
                <div class="st-stamp-info">
                    <div class="st-mini-tape"></div>
                    <svg class="st-cat-stamp" viewBox="0 0 100 100">
                        <g transform="rotate(-15 50 50)">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="var(--st-accent)" stroke-width="2" opacity="0.3"/>
                            <circle cx="50" cy="50" r="40" fill="none" stroke="var(--st-accent)" stroke-width="1" opacity="0.3"/>
                            <path d="M50 70 C40 70 35 60 35 55 C35 48 40 45 50 45 C60 45 65 48 65 55 C65 60 60 70 50 70 Z" fill="var(--st-accent)" opacity="0.3"/>
                            <circle cx="35" cy="35" r="7" fill="var(--st-accent)" opacity="0.3"/>
                            <circle cx="50" cy="28" r="8" fill="var(--st-accent)" opacity="0.3"/>
                            <circle cx="65" cy="35" r="7" fill="var(--st-accent)" opacity="0.3"/>
                            <path id="st-stamp-curve" d="M 20 50 A 30 30 0 0 0 80 50" fill="transparent" />
                            <text font-family="var(--st-font-serif)" font-size="12" fill="var(--st-accent)" opacity="0.4" font-weight="bold" letter-spacing="4">
                                <textPath href="#st-stamp-curve" startOffset="50%" text-anchor="middle">RECORD</textPath>
                            </text>
                        </g>
                    </svg>

                    <div class="st-stamp-item" style="flex: 1 1 100%;">
                        <div class="st-memory-scale">
                            <span class="st-memory-label">
                                <span id="val-stage-text">记忆融合期 · 0%</span>
                                <span id="val-stability-delta" class="st-delta-badge zero">0</span>
                            </span>
                            <div class="st-memory-track" id="track-stability">
                                <!-- JS动态填充刻度 -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="st-stamp-item">
                        <span class="st-stamp-label">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                            时间
                        </span>
                        <span class="st-stamp-value" id="val-time">--</span>
                    </div>
                    <div class="st-stamp-item">
                        <span class="st-stamp-label">
                            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                            地点
                        </span>
                        <span class="st-stamp-value" id="val-location">--</span>
                    </div>
                    <div class="st-stamp-item" style="flex-grow: 1;">
                        <span class="st-stamp-label">
                            <svg viewBox="0 0 24 24"><path d="M15.33 4H8.67l-3.5 2.8L3.6 15l2.4 1.2 1.6-4.2H9v7h6v-7h1.4l1.6 4.2 2.4-1.2-1.57-8.2L15.33 4zm-3.33 2.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5.67-1.5 1.5-1.5z"/></svg>
                            着装
                        </span>
                        <span class="st-stamp-value" id="val-outfit">--</span>
                    </div>
                </div>

            </div>
        </div>

    </div>
</body>
